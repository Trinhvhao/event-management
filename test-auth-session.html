<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Auth Session</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }

        .section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }

        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
</head>

<body>
    <h1>Test Authentication Session</h1>

    <div class="section">
        <h2>1. Login</h2>
        <button onclick="testLogin()">Login as Admin</button>
        <div id="loginResult"></div>
    </div>

    <div class="section">
        <h2>2. Check LocalStorage</h2>
        <button onclick="checkLocalStorage()">Check Storage</button>
        <div id="storageResult"></div>
    </div>

    <div class="section">
        <h2>3. Check Zustand Store</h2>
        <button onclick="checkZustandStore()">Check Store</button>
        <div id="storeResult"></div>
    </div>

    <div class="section">
        <h2>4. Test API Call with Token</h2>
        <button onclick="testApiCall()">Get Profile</button>
        <div id="apiResult"></div>
    </div>

    <div class="section">
        <h2>5. Simulate Page Reload</h2>
        <button onclick="simulateReload()">Reload Page</button>
        <p>This will reload the page to test session persistence</p>
    </div>

    <script>
        const API_URL = 'http://localhost:7776/api';

        async function testLogin() {
            const resultDiv = document.getElementById('loginResult');
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'admin@dnu.edu.vn',
                        password: 'admin123'
                    })
                });

                const data = await response.json();

                if (data.success) {
                    // Save to localStorage like the app does
                    localStorage.setItem('token', data.data.token);
                    if (data.data.refreshToken) {
                        localStorage.setItem('refreshToken', data.data.refreshToken);
                    }

                    // Save to Zustand storage format
                    const authStorage = {
                        state: {
                            user: data.data.user,
                            token: data.data.token,
                            isAuthenticated: true
                        },
                        version: 0
                    };
                    localStorage.setItem('auth-storage', JSON.stringify(authStorage));

                    resultDiv.innerHTML = `<p class="success">✓ Login successful!</p><pre>${JSON.stringify(data.data.user, null, 2)}</pre>`;
                } else {
                    resultDiv.innerHTML = `<p class="error">✗ Login failed: ${data.error?.message}</p>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">✗ Error: ${error.message}</p>`;
            }
        }

        function checkLocalStorage() {
            const resultDiv = document.getElementById('storageResult');
            const token = localStorage.getItem('token');
            const refreshToken = localStorage.getItem('refreshToken');
            const authStorage = localStorage.getItem('auth-storage');

            let html = '<h3>LocalStorage Contents:</h3>';
            html += `<p><strong>token:</strong> ${token ? '✓ Present' : '✗ Missing'}</p>`;
            if (token) {
                html += `<pre>${token.substring(0, 50)}...</pre>`;

                // Decode JWT to check expiry
                try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    const exp = new Date(payload.exp * 1000);
                    const now = new Date();
                    const isExpired = exp < now;
                    html += `<p><strong>Token expires:</strong> ${exp.toLocaleString()} ${isExpired ? '(EXPIRED!)' : '(Valid)'}</p>`;
                    html += `<pre>${JSON.stringify(payload, null, 2)}</pre>`;
                } catch (e) {
                    html += `<p class="error">Could not decode token</p>`;
                }
            }

            html += `<p><strong>refreshToken:</strong> ${refreshToken ? '✓ Present' : '✗ Missing'}</p>`;
            html += `<p><strong>auth-storage:</strong> ${authStorage ? '✓ Present' : '✗ Missing'}</p>`;

            if (authStorage) {
                try {
                    const parsed = JSON.parse(authStorage);
                    html += `<pre>${JSON.stringify(parsed, null, 2)}</pre>`;
                } catch (e) {
                    html += `<p class="error">Could not parse auth-storage</p>`;
                }
            }

            resultDiv.innerHTML = html;
        }

        function checkZustandStore() {
            const resultDiv = document.getElementById('storeResult');
            const authStorage = localStorage.getItem('auth-storage');

            if (!authStorage) {
                resultDiv.innerHTML = '<p class="error">✗ No Zustand store found in localStorage</p>';
                return;
            }

            try {
                const store = JSON.parse(authStorage);
                let html = '<h3>Zustand Store State:</h3>';
                html += `<p><strong>isAuthenticated:</strong> ${store.state?.isAuthenticated ? '✓ true' : '✗ false'}</p>`;
                html += `<p><strong>user:</strong> ${store.state?.user ? '✓ Present' : '✗ Missing'}</p>`;
                html += `<p><strong>token:</strong> ${store.state?.token ? '✓ Present' : '✗ Missing'}</p>`;
                html += `<pre>${JSON.stringify(store, null, 2)}</pre>`;
                resultDiv.innerHTML = html;
            } catch (e) {
                resultDiv.innerHTML = `<p class="error">✗ Error parsing store: ${e.message}</p>`;
            }
        }

        async function testApiCall() {
            const resultDiv = document.getElementById('apiResult');
            const token = localStorage.getItem('token');

            if (!token) {
                resultDiv.innerHTML = '<p class="error">✗ No token found. Please login first.</p>';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/profile`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    resultDiv.innerHTML = `<p class="success">✓ API call successful!</p><pre>${JSON.stringify(data.data, null, 2)}</pre>`;
                } else {
                    resultDiv.innerHTML = `<p class="error">✗ API call failed: ${data.error?.message || response.statusText}</p>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">✗ Error: ${error.message}</p>`;
            }
        }

        function simulateReload() {
            window.location.reload();
        }

        // Check storage on page load
        window.addEventListener('load', () => {
            checkLocalStorage();
            checkZustandStore();
        });
    </script>
</body>

</html>
